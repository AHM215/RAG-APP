name: rag-app
services:
  mongodb:
    image: mongo:7-jammy
    
    container_name: mongodb
    
    ports:
      - "27007:27017"
    
    volumes:
      - mongo_data:/data/db
    
    networks:
      - backend
    
    restart: always
  # FastAPI Application
  fastapi:
    container_name: fastapi
    build:
      context: ..
      dockerfile: docker/minirag/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - fastapi_data:/app/files

    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
    networks:
      - backend
    restart: always
    env_file:
      - ../src/.env

networks:
  backend:
    driver: bridge

volumes:
  fastapi_data:
  mongo_data: